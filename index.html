<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASINO VIP - BAZZAN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; --blanco: #fff; }
        body { background: var(--bg); color: var(--blanco); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        
        input { width: 100%; background: #000; color: var(--main); border: 1px solid var(--main); padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; font-weight: bold; }
        .btn { background: var(--main); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-verde { background: var(--verde); } .btn-rojo { background: var(--rojo); color: white;}
        
        .header { background: var(--box); border-bottom: 2px solid var(--main); padding: 15px; margin-bottom: 20px; border-radius: 0 0 15px 15px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        /* 🎡 DISEÑO DE RULETA 🎡 */
        .ruleta-wrapper { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        .pequena { transform: scale(0.7); margin: -40px auto; }
        .ruleta-borde { position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; background: linear-gradient(45deg, #f39c12, #f1c40f, #e67e22, #f39c12); box-shadow: 0 0 30px rgba(243, 156, 18, 0.6); }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; background: #222; }
        .ruleta-numero { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; }
        .ruleta-numero span { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; font-weight: 900; font-size: 22px; text-shadow: 2px 2px 4px #000; }
        .puntero { position: absolute; top: -25px; left: calc(50% - 20px); width: 40px; height: 50px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .ruleta-centro { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #fff; border-radius: 50%; z-index: 5; border: 4px solid var(--main); }

        #ruleta-publica { display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #222 0%, #000 100%); height: 100vh;}
        .telon-negro { font-size: 26px; color: var(--main); animation: parpadeo 2s infinite; font-weight: bold; text-transform: uppercase; }
        @keyframes parpadeo { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; color:var(--main); justify-content:center; align-items:center; flex-direction:column; }
        .modal-premio { display:none; background: var(--main); color:black; padding: 20px 50px; font-size: 40px; font-weight: 900; border-radius: 20px; margin-top: 30px; box-shadow: 0 0 50px var(--main); animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <script>
        // TU NUEVA URL DE EXCEL (ACTUALIZADA)
        const API_GAS = "https://script.google.com/macros/s/AKfycbzlF7OhLViqAg0V6Dl1nv_HgpG55vfIXkYcB-SVow__dx-xl7fXNvxaAi3bCO-OF-2/exec";
        const API_VISION = "AIzaSyBi9F3K2PXOeRoR2w-rf63u8d6PZyFUT-U"; 
        let usuarioActual = "";
        let yaMostrePremio = false; 
    </script>

    <div id="loader"><h2 id="loader-txt">Conectando...</h2></div>

    <div id="pantalla-login" class="pantalla activa">
        <h1 style="color:var(--main); font-size: 50px; margin-bottom: 10px;">CASINO VIP</h1>
        <p style="color:#666; margin-bottom: 40px;">ADMINISTRACIÓN BAZZAN</p>
        <input type="text" id="l-user" placeholder="Usuario">
        <input type="password" id="l-pass" placeholder="Clave">
        <button class="btn" onclick="iniciarSesion()">ENTRAR AL SISTEMA</button>
        <br><br>
        <button class="btn" style="background:#1a1a1a; color:#fff; border: 1px solid #333;" onclick="verRuletaPublica()">PANTALLA CLIENTES</button>
    </div>

    <div id="pantalla-dashboard" class="pantalla">
        <div class="header"><h3>CAJERO: <span id="nom-cajero" style="color:var(--main);"></span></h3></div>
        <div class="nav-grid">
            <button class="btn" onclick="mostrarSeccion('sec-ruleta')">🎡 RULETA</button>
            <button class="btn btn-rojo" onclick="location.reload()">SALIR</button>
        </div>

        <div id="sec-ruleta">
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:#3498db; color:white;" onclick="controlRuleta('ACTIVAR')">MOSTRAR</button>
                <button class="btn btn-rojo" onclick="controlRuleta('APAGAR')">APAGAR/RESETEAR</button>
            </div>
            <button class="btn btn-verde" style="font-size: 22px; padding: 25px;" onclick="girarRuletaAdmin()">🎰 LANZAR SORTEO</button>
            <div class="ruleta-wrapper pequeña" id="wrap-ruleta-cajero" style="display: none;">
                <div class="ruleta-borde"></div><div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cajero"></div><div class="ruleta-centro"></div>
            </div>
        </div>
    </div>

    <div id="ruleta-publica" class="pantalla">
        <div id="telon" class="telon-negro">⏳ ESPERANDO SORTEO...</div>
        <div class="ruleta-wrapper" id="wrap-ruleta-cliente" style="display: none;">
            <div class="ruleta-borde"></div><div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cliente"></div><div class="ruleta-centro"></div>
        </div>
        <div id="premio-ganador" class="modal-premio">MÁQUINA <span id="ganador-txt"></span> GANA</div>
    </div>

    <script>
        function loader(txt) { document.getElementById('loader-txt').innerText = txt; document.getElementById('loader').style.display = 'flex'; }
        function ocultarLoader() { document.getElementById('loader').style.display = 'none'; }
        function mostrarSeccion(id) { document.getElementById('sec-ruleta').style.display='block'; }

        async function iniciarSesion() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            if(!u || !p) return alert("Faltan datos");
            loader("Iniciando...");
            try {
                let res = await fetch(`${API_GAS}?action=login&u=${u}&p=${p}`);
                let data = await res.json();
                if(data.status === "success") {
                    usuarioActual = data.usuario;
                    document.getElementById('nom-cajero').innerText = usuarioActual.toUpperCase();
                    document.getElementById('pantalla-login').classList.remove('activa');
                    document.getElementById('pantalla-dashboard').classList.add('activa');
                } else { alert("Credenciales incorrectas"); }
            } catch(e) { alert("Error de servidor. Reintente en un momento."); }
            ocultarLoader();
        }

        function construir(id) {
            let r = document.getElementById(id); r.innerHTML = '';
            let colores = ['#E50914', '#1E90FF', '#FFD700', '#8A2BE2', '#FF8C00', '#00FA9A']; 
            let angulo = 360 / 17; let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++) {
                bg += `${colores[(i-1)%colores.length]} ${(i-1)*angulo}deg ${i*angulo}deg${i<17?',':')'}`;
                let num = document.createElement('div'); num.className = 'ruleta-numero';
                num.style.transform = `rotate(${(i-1)*angulo + angulo/2}deg)`;
                num.innerHTML = `<span>${i}</span>`; r.appendChild(num);
            }
            r.style.background = bg;
        }
        construir('ruleta-cajero'); construir('ruleta-cliente');

        async function controlRuleta(comando, ganador="") {
            if(comando === 'APAGAR') document.getElementById('wrap-ruleta-cajero').style.display = 'none';
            if(comando === 'ACTIVAR') document.getElementById('wrap-ruleta-cajero').style.display = 'block';
            fetch(`${API_GAS}?action=ruleta_control&comando=${comando}&ganador=${ganador}`);
        }

        function girarRuletaAdmin() {
            let g = Math.floor(Math.random() * 17) + 1;
            controlRuleta("GIRAR", g);
            let r = document.getElementById('ruleta-cajero');
            r.style.transition = 'none'; r.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                let offset = (g - 1) * (360/17) + (360/17)/2;
                r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform = `rotate(${3600 - offset}deg)`;
            }, 100);
        }

        function verRuletaPublica() {
            document.getElementById('pantalla-login').classList.remove('activa');
            document.getElementById('ruleta-publica').classList.add('activa');
            setInterval(async () => {
                try {
                    let r = await fetch(`${API_GAS}?action=ruleta_estado`);
                    let d = await r.json();
                    let telon = document.getElementById('telon'); let wrap = document.getElementById('wrap-ruleta-cliente');
                    let premio = document.getElementById('premio-ganador');
                    
                    if(d.estado === "ESPERA") { telon.style.display="block"; wrap.style.display="none"; premio.style.display="none"; yaMostrePremio = false; }
                    if(d.estado === "ACTIVA") { telon.style.display="none"; wrap.style.display="block"; premio.style.display="none"; yaMostrePremio = false; }
                    if(d.estado === "GIRANDO" && !yaMostrePremio) {
                        yaMostrePremio = true;
                        let r_cl = document.getElementById('ruleta-cliente');
                        r_cl.style.transition = 'none'; r_cl.style.transform = 'rotate(0deg)';
                        setTimeout(() => {
                            let offset = (d.ganador - 1) * (360/17) + (360/17)/2;
                            r_cl.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                            r_cl.style.transform = `rotate(${3600 - offset}deg)`;
                        }, 100);
                        // SUSPENSO: Esperar 8.5 segundos antes de mostrar el cartel
                        setTimeout(() => { document.getElementById('ganador-txt').innerText = d.ganador; premio.style.display="block"; }, 8500);
                    }
                } catch(e){}
            }, 2000);
        }
    </script>
</body>
</html>
