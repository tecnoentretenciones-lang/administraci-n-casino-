<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOENTRETE - GESTIÓN TOTAL</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin:0; }
        .header { padding: 30px; background: var(--box); border-bottom: 2px solid var(--main); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--box); padding: 30px; border-radius: 20px; border: 1px solid #333; cursor: pointer; }
        input { width: 80%; padding: 15px; margin: 10px; border-radius: 10px; border: none; text-align: center; }
        .btn { background: var(--main); color: #000; border: none; padding: 20px; width: 80%; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .full { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="login-admin" class="full">
        <h1 style="color:var(--main)">SISTEMA CENTRAL</h1>
        <input type="password" id="pass-master" placeholder="CLAVE MAESTRA">
        <button class="btn" onclick="accesoMaster()">ENTRAR AL PANEL</button>
    </div>

    <div class="header">
        <h1>TECNOENTRETE</h1>
        <p>ADMINISTRADOR GENERAL</p>
    </div>

    <div class="grid">
        <div class="card" onclick="alert('Gestión de Locales Abierta')">🏢 LOCALES</div>
        <div class="card" onclick="alert('Consignaciones Activas')">🤝 CONSIGNACIÓN</div>
        <div class="card" onclick="alert('Reporte de Gastos')">💳 GASTOS EMPRESA</div>
        <div class="card" onclick="alert('Crear Cajero/Pasillero')">👥 PERSONAL</div>
    </div>

    <script>
        function accesoMaster() {
            const p = document.getElementById('pass-master').value;
            if(p === "1234") { // Tu clave de dueño
                document.getElementById('login-admin').style.display = 'none';
            } else { alert("ACCESO DENEGADO"); }
        }
    </script>
</body>
</html>
