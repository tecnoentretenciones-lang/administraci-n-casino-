<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECNOENTRETE - SISTEMA DE GESTIÓN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        
        /* LOGO GIGANTE INICIAL */
        .logo-container { margin: 50px 0; }
        .logo-text { font-size: 55px; font-weight: 900; color: var(--main); letter-spacing: -2px; margin: 0; line-height: 1; }
        .sub-text { color: #555; letter-spacing: 5px; font-size: 14px; margin-top: 5px; text-transform: uppercase; }

        /* FORMULARIOS ESTILO BAZZAN */
        input, select, textarea { width: 100%; background: #000; color: var(--main); border: 1px solid #333; padding: 18px; border-radius: 15px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        
        /* BOTONES CON RELIEVE ORIGINAL */
        .btn { background: var(--main); color: #000; border: none; padding: 22px; width: 100%; border-radius: 18px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; transition: 0.2s; box-shadow: 0 5px 0 #b37400; }
        .btn:active { transform: scale(0.96); box-shadow: 0 2px 0 #b37400; }
        .btn-secundario { background: #1a1a1a; color: #fff; border: 1px solid #333; box-shadow: 0 5px 0 #000; }
        .btn-verde { background: var(--verde); color: #000; box-shadow: 0 5px 0 #219351; }

        .header-cajero { background: var(--box); padding: 20px; border-radius: 0 0 30px 30px; border-bottom: 3px solid var(--main); margin-bottom: 30px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }

        /* RULETA 17 NÚMEROS COLORES */
        .ruleta-wrapper { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; background: #222; }
        .puntero { position: absolute; top: -30px; left: calc(50% - 25px); width: 50px; height: 60px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 5px 5px #000); }
        .segmento { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .segmento span { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 22px; color: #fff; text-shadow: 2px 2px 2px #000; }
    </style>
</head>
<body>

    <div id="p-login" class="pantalla activa">
        <div class="logo-container">
            <h1 class="logo-text">TECNOENTRETE</h1>
            <p class="sub-text">SISTEMA CENTRAL</p>
        </div>
        <div style="padding: 0 10px;">
            <input type="text" id="u-user" placeholder="USUARIO">
            <input type="password" id="u-pass" placeholder="CLAVE">
            <button class="btn" onclick="login()">INGRESAR AL PANEL</button>
        </div>
    </div>

    <div id="p-admin" class="pantalla">
        <div class="header-cajero">
            <h3 style="margin:0; color:var(--main);">LOCAL: BAZAR | <span id="txt-rol"></span></h3>
        </div>
        
        <div class="nav-grid">
            <button class="btn btn-secundario" onclick="abrir('sec-pagos')">📸 PAGOS</button>
            <button class="btn btn-secundario" onclick="abrir('sec-clientes')">👥 CLIENTES</button>
            <button class="btn btn-secundario" onclick="abrir('sec-ruleta')">🎡 SORTEO</button>
            <button class="btn btn-secundario" onclick="abrir('sec-gastos')">💳 GASTOS</button>
        </div>

        <div id="sec-pagos" style="display:none; padding:10px;">
            <input type="file" accept="image/*" capture="camera">
            <input type="number" placeholder="MONTO $">
            <button class="btn btn-verde">GUARDAR PAGO</button>
        </div>

        <div id="sec-clientes" style="display:none; padding:10px;">
            <input type="text" placeholder="NOMBRE COMPLETO">
            <select>
                <option>CLIENTE NORMAL</option>
                <option>CLIENTE VIP ⭐</option>
                <option>SUPER VIP 🔥</option>
            </select>
            <button class="btn btn-verde">REGISTRAR CLIENTE</button>
        </div>

        <div id="sec-ruleta" style="display:none; padding:10px;">
            <div class="ruleta-wrapper" style="transform: scale(0.85); margin-top:-20px;">
                <div class="puntero"></div><div id="r-admin" class="ruleta-circulo"></div>
            </div>
            <button class="btn btn-verde" onclick="lanzarSorteo()">🎰 LANZAR SORTEO TV</button>
        </div>

        <button class="btn btn-secundario" style="margin-top: 30px; background: #333;" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <script>
        const colores = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00'];

        function dibujarRuleta(id) {
            const r = document.getElementById(id);
            if(!r) return; r.innerHTML = '';
            const ang = 360/17;
            let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++){
                bg += `${colores[i-1]} ${(i-1)*ang}deg ${i*ang}deg${i<17?',':')'}`;
                let d = document.createElement('div');
                d.className = 'segmento';
                d.style.transform = `rotate(${(i-1)*ang + ang/2}deg)`;
                d.innerHTML = `<span>${i}</span>`;
                r.appendChild(d);
            }
            r.style.background = bg;
        }

        function abrir(id) {
            ['sec-pagos','sec-clientes','sec-ruleta','sec-gastos'].forEach(s => {
                const el = document.getElementById(s);
                if(el) el.style.display = 'none';
            });
            document.getElementById(id).style.display = 'block';
            if(id === 'sec-ruleta') dibujarRuleta('r-admin');
        }

        function login() {
            const u = document.getElementById('u-user').value.toUpperCase();
            const p = document.getElementById('u-pass').value;
            if(u !== "" && p !== "") {
                document.getElementById('p-login').classList.remove('activa');
                document.getElementById('p-admin').classList.add('activa');
                document.getElementById('txt-rol').innerText = u;
            } else {
                alert("Ingrese Usuario y Clave para TECNOENTRETE");
            }
        }

        function lanzarSorteo() {
            const ganador = Math.floor(Math.random() * 17) + 1;
            const ang = 360/17;
            const rot = 3600 - ((ganador-1)*ang + ang/2);
            localStorage.setItem('TECNO_GANADOR', ganador);
            const r = document.getElementById('r-admin');
            r.style.transition = 'none'; r.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform = `rotate(${rot}deg)`;
            }, 100);
            setTimeout(() => alert("MÁQUINA " + ganador + " GANADORA"), 8500);
        }

        window.onload = () => { if(document.getElementById('r-admin')) dibujarRuleta('r-admin'); };
    </script>
</body>
</html>
