<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SORTEO BAZAR EN VIVO</title>
    <style>
        body { background: #000; color: gold; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .ruleta-gran { width: 500px; height: 500px; border-radius: 50%; border: 10px solid gold; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; box-shadow: 0 0 100px rgba(255,215,0,0.3); }
        .puntero { width: 60px; height: 80px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); margin-bottom: -30px; z-index: 10; position: relative; }
        #premio { display: none; font-size: 80px; margin-top: 30px; animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1 id="texto">ESPERANDO PRÓXIMO SORTEO...</h1>
    <div class="puntero"></div>
    <div id="ruleta-tv" class="ruleta-gran"></div>
    <div id="premio">¡MÁQUINA <span id="num-ganador"></span> GANA!</div>

    <script>
        const API_GAS = "TU_URL_DE_GOOGLE_APPS_SCRIPT";
        
        function dibujar() { /* Misma función de los 17 colores */ }

        // Sistema de "Escucha": Revisa cada 2 segundos si el cajero apretó el botón
        setInterval(async () => {
            let res = await fetch(`${API_GAS}?action=ruleta_estado&local=BAZAR`);
            let d = await res.json();
            
            if(d.estado === "GIRANDO") {
                document.getElementById('texto').style.display = 'none';
                const r = document.getElementById('ruleta-tv');
                r.style.transform = `rotate(${3600 - ((d.ganador-1)*(360/17)+(360/17)/2)}deg)`;
                
                setTimeout(() => {
                    document.getElementById('num-ganador').innerText = d.ganador;
                    document.getElementById('premio').style.display = 'block';
                }, 8500);
            }
        }, 2000);
    </script>
</body>
</html>
